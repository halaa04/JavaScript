<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <h1>even odd </h1>
    <div id="output"></div>
    <script>

      let x = Number(prompt("Enter Number"));
      if (x % 2 == 0) {
        alert(`The number ${x} is Even`);
      } else {
        alert(`The number ${x} is odd`);
      }
    </script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>task1</title>
  </head>
  <body>
    <h1>Calculator</h1>
    <div id="output"></div>

    <script>
      let operation = prompt("selelct Operation +, -, *,  / ");
      let number1 = Number(prompt("Enter The First Number:"));
      let number2 = Number(prompt("Enter The Second Number:"));
      let result = 0;

      if (operation === "+") {
        result = number1 + number2;
      } else if (operation === "-") {
        result = number1 - number2;
      } else if (operation === "*") {
        result = number1 * number2;
      } else if (operation === "/") {
        result = number1 / number2;
      } else {
        result = "Invalid operation";
      }
      let cal = `${number1} ${operation} ${number2} = ${result}`;
      console.log(cal);
      document.getElementById("output").innerHTML = cal;
    </script>
  </body>
</html>

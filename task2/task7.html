<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <h1>7</h1>
    <pre id="output"></pre>
    <script>
      let output = "";

      for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 5; j++) {
          if (j === i) {
            output += i + " ";
          } else {
            output += "0 ";
          }
        }
        output += "\n";
      }

      document.getElementById("output").textContent = output;
    </script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <h1>5</h1>
    <pre id="output"></pre>
    <script>
      let result = "";
      let letters = ["A", "B", "C", "D", "E"];

      for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 5; j++) {
          if (j < 4 - i) {
            result += "A ";
          } else {
            result += letters[i] + " ";
          }
        }

        result += "\n";
      }

      document.getElementById("output").textContent = result;
    </script>
  </body>
</html>

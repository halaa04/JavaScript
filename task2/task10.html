<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <h1>7</h1>
    <pre id="output"></pre>
    <script>
      let str = prompt("Enter something : ")
      let count =0;
      for (let i =0; i < str.length; i++) 
      {
        if (str.charAt(i) == 'c')
        count ++;
      }
      alert (count);
   </script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <h1>7</h1>
    <pre id="output"></pre>
    <script>
         let factorial=1;
      let num = Number(prompt("Enter a number : "));
      for (let i = 1; i <= num; i++) 
      {
        factorial = factorial * i;
      }
      alert(factorial);
   </script>
  </body>
</html>

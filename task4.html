<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>task4</title>
  </head>
  <body>
    <h1>Simple Condition</h1>
    <div id="output"></div>
    <script>
      let x = Number(prompt("Enter the first number"));
      let y = Number(prompt("Enter the second number"));
      let result;

      if (x > y) {
        result = "Hello World";
      } else {
        result = "Goodbye";
      }

      alert(result);
      console.log(result);
      document.getElementById("output").innerHTML = result;
    </script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>task3</title>
  </head>
  <body>
    <h1>area</h1>
    <div id="output"></div>

    <script>
      let r = prompt("Enter a number :  ");

      const pi = Math.PI;

      let area = pi * r * r;
      console.log("Area of the circle = " + area);
      document.getElementById("output").innerHTML = area;
    </script>
  </body>
